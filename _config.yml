# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: smileying的博客
subtitle: '' 
description: 'keep learning'
keywords:
author: smileying
language: zh-CN # 主题语言
timezone: Asia/Shanghai #中国的时区，不要乱改城市

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://yoursite.com # 绑定域名
root: / # 默认根路径，指向实际的source
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: README.md # 部署的时候不包含的文件 

# Writing
new_post_name: :title.md # File name of new posts 默认的新博文名称
default_layout: post # 默认布局
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0 # 把博客名称改成小写/大写（1，2）
render_drafts: false # 是否显示草稿
post_asset_folder: false # 是否启用资源文件夹（用来存放相对路径图片或文件）
relative_link: false # 把链接改为与根目录的相对位址
future: true
highlight:
  enable: true # 是否开启代码高亮
  line_number: true  # 是否增加代码行号
  auto_detect: false # 自动判断代码语言
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator: # 首页博客分布
  path: '' # 博客的默认路径
  per_page: 10 # 每页博客数量上限
  order_by: -date # 博客排序

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD # 博客日期格式
time_format: HH:mm:ss # 博客时间格式
## Use post's date for updated date unless set in front-matter
use_date_for_updated: false

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# 归档页的分页设置
archive_generator: #归档页的配置
  per_page: 30 #归档页每页博客数
  yearly: true #按年归档
  monthly: true #按月归档

#标签页的分页设置
tag_generator:
  per_page: 20 #标签页每页博客数

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/docs/deployment.html

# deploy:
#   type: git
#   repo: <repository url> # https://bitbucket.org/JohnSmith/johnsmith.bitbucket.io
#   branch: [branch]
#   message: [message]
deploy:  #博客部署
  type: git
  repo: https://github.com/smileying/smileying.github.io.git
  branch: master

# search 
# https://github.com/theme-next/hexo-generator-searchdb
search:
  path: search.html
  fiels: post # post page all
  content: true
  format: html